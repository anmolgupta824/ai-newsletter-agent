# AI Digest Agent — Weekly generation cron
# Runs Thursday 10pm UTC → Friday 6am SGT (adjust to your timezone)
#
# Required secrets (GitHub → Settings → Secrets → Actions):
#   SUPABASE_URL               Your Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY  Service role key (NOT the anon key)
#   OPENROUTER_API_KEY         OpenRouter API key
#   TAVILY_API_KEY             Tavily search API key
#
# Optional secrets:
#   PRODUCT_HUNT_API_KEY       Product Hunt OAuth key
#   GITHUB_TOKEN               GitHub personal access token
#   SITE_URL                   Your site URL (for OpenRouter headers)
#   DIGEST_NAME                Your digest name
#
# Manual trigger: Actions tab → "AI Digest: Weekly Pipeline" → Run workflow

name: AI Digest — Weekly Pipeline

on:
  schedule:
    - cron: '0 22 * * 4'  # Thursday 10pm UTC — change to your preferred schedule
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  generate:
    name: Generate and publish weekly digest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Health check — verify sources are up
        run: npx tsx src/index.ts --health-check || true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Generate digest
        run: npx tsx src/index.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PRODUCT_HUNT_API_KEY: ${{ secrets.PRODUCT_HUNT_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          DIGEST_NAME: ${{ secrets.DIGEST_NAME }}

      - name: Done
        if: always()
        run: echo "Digest pipeline complete."
