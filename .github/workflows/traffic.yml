name: Daily Traffic Snapshot

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch traffic data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          
          CLONES=$(gh api repos/${{ github.repository }}/traffic/clones 2>/dev/null || echo '{"count":0,"uniques":0,"clones":[]}')
          VIEWS=$(gh api repos/${{ github.repository }}/traffic/views 2>/dev/null || echo '{"count":0,"uniques":0,"views":[]}')
          REFERRERS=$(gh api repos/${{ github.repository }}/traffic/popular/referrers 2>/dev/null || echo '[]')
          PATHS=$(gh api repos/${{ github.repository }}/traffic/popular/paths 2>/dev/null || echo '[]')
          REPO=$(gh api repos/${{ github.repository }} --jq '{stars: .stargazers_count, forks: .forks_count, watchers: .subscribers_count}' 2>/dev/null || echo '{}')
          
          mkdir -p traffic-data
          
          jq -n \
            --arg date "$DATE" \
            --argjson clones "$CLONES" \
            --argjson views "$VIEWS" \
            --argjson referrers "$REFERRERS" \
            --argjson paths "$PATHS" \
            --argjson repo "$REPO" \
            '{
              date: $date,
              timestamp: (now | strftime("%Y-%m-%dT%H:%M:%SZ")),
              clones: $clones,
              views: $views,
              referrers: $referrers,
              paths: $paths,
              repo: $repo
            }' > "traffic-data/snapshot-${DATE}.json"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic-data/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Daily traffic snapshot $(date -u +%Y-%m-%d)"
          git push
